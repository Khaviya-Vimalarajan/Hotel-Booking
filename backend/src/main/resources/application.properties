# Database Connection (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/luxury_resort_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Khaviya@2003
